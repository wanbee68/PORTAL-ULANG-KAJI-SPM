<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Ulang Kaji SPM</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel untuk compile JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #475569;">
      Sistem sedang dimuatkan... Jika paparan ini kekal lebih dari 5 saat, sila periksa kod Firebase anda.
    </div>
  </div>

  <script type="text/babel" data-type="module">
    // --- PEMERANGKAP RALAT (ERROR CATCHER) ---
    // Mengelakkan skrin putih jika cikgu tersilap letak koma/tanda petik
    window.addEventListener('error', function(e) {
      document.getElementById('root').innerHTML = `
        <div style="padding: 30px; background-color: #fee2e2; color: #991b1b; font-family: sans-serif; min-height: 100vh;">
          <h2 style="font-weight: bold; font-size: 24px; margin-bottom: 10px;">⚠️ Ralat Sistem Dikesan!</h2>
          <p>Paparan tidak dapat dimuatkan kerana terdapat kesilapan pada kod (Sintaks).</p>
          <p style="background: #fff; padding: 10px; border-radius: 5px; margin-top: 15px; font-family: monospace;"><b>Mesej Ralat:</b> ${e.message}</p>
          <ul style="margin-top: 20px;">
            <li>Sila pastikan Cikgu meletakkan maklumat Firebase di dalam tanda petik. Contoh: <code>apiKey: "AIzaSy..."</code></li>
            <li>Pastikan tiada koma (,) yang terpadam di hujung setiap baris.</li>
          </ul>
        </div>
      `;
    });

    // Import Firebase Modular (Terus dari sumber CDN - Sangat Stabil untuk GitHub Pages)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const { useState, useEffect } = React;

    // ==========================================
    // CIKGU: GANTIKAN KOD DI BAWAH JIKA GUNA DI GOOGLE SITES / GITHUB
    // ==========================================
    let firebaseConfig = {};
    let isMissingConfig = false;

    if (typeof __firebase_config !== 'undefined') {
      // Ini berjalan jika di dalam Canvas AI
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      // INI BERJALAN DI DALAM GOOGLE SITES/GITHUB CIKGU
      // Cikgu wajib letak 'firebaseConfig' dari Firebase Console cikgu di sini:
      // PENTING: Jangan buang tanda petik (" ") sewaktu menukar perkataan TUKAR_INI
      const firebaseConfig = {
        apiKey: "AIzaSyBThzeYE3QXOBB2XWot2vB9aOJSbzAv7ew",
        authDomain: "portal-ulang-kaji-spm.firebaseapp.com",
        databaseURL: "https://portal-ulang-kaji-spm-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "portal-ulang-kaji-spm",
        storageBucket: "portal-ulang-kaji-spm.firebasestorage.app",
        messagingSenderId: "1006940786054",
        appId: "1:1006940786054:web:c69fdf484eee4993023007"
      };
      
      if (firebaseConfig.apiKey === "AIzaSyBThzeYE3QXOBB2XWot2vB9aOJSbzAv7ew") {
        isMissingConfig = true;
      }
    }

    const app = isMissingConfig ? null : initializeApp(firebaseConfig);
    const auth = isMissingConfig ? null : getAuth(app);
    const db = isMissingConfig ? null : getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'portal-ulang-kaji-spm';

    // --- DATA PEMBELAJARAN & TETAPAN ---
    const SENARAI_NEGERI = ["Johor", "Kedah", "Kelantan", "Melaka", "Negeri Sembilan", "Pahang", "Perak", "Perlis", "Pulau Pinang", "Sabah", "Sarawak", "Selangor", "Terengganu", "WP Kuala Lumpur", "MRSM", "SBP", "YIK"];
    const SENARAI_KERTAS = ["Kertas 1", "Kertas 2", "Kertas 3", "Kertas 4"];
    const SENARAI_TAHUN = ["2021", "2022", "2023", "2024", "2025", "2026"];

    function App() {
      const [user, setUser] = useState(null);
      const [questions, setQuestions] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [isTeacher, setIsTeacher] = useState(false);
      const [showTeacherLogin, setShowTeacherLogin] = useState(false);
      
      const [filterTahun, setFilterTahun] = useState('');
      const [filterNegeri, setFilterNegeri] = useState('');
      const [filterKertas, setFilterKertas] = useState('');
      const [selectedQuestion, setSelectedQuestion] = useState(null);
      
      const [studentForm, setStudentForm] = useState({ nama: '', maktab: '', kelas: '', bahagian: '', jawapan: '' });
      const [searchMaktab, setSearchMaktab] = useState('');
      const [notification, setNotification] = useState({ show: false, message: '', type: 'success' });

      const [newQuestion, setNewQuestion] = useState({ tahun: '2024', negeri: 'Selangor', kertas: 'Kertas 1', pautan: '' });
      const [gradingSubmission, setGradingSubmission] = useState(null);
      const [gradingForm, setGradingForm] = useState({ bintang: '', kekuatan: '', kelemahan: '', intervensi: '' });
      const [teacherTab, setTeacherTab] = useState('semakan');

      useEffect(() => {
        if (isMissingConfig || !auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth error:", err);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || isMissingConfig || !db) return;
        
        const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
        const unsubQ = onSnapshot(qRef, (snapshot) => {
          setQuestions(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, (err) => console.error(err));

        const sRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
        const unsubS = onSnapshot(sRef, (snapshot) => {
          const sData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          sData.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
          setSubmissions(sData);
        }, (err) => console.error(err));

        return () => { unsubQ(); unsubS(); };
      }, [user]);

      const showToast = (message, type = 'success') => {
        setNotification({ show: true, message, type });
        setTimeout(() => setNotification({ show: false, message: '', type: 'success' }), 3000);
      };

      const convertDriveLinkToPreview = (link) => {
        if (!link) return '';
        if (link.includes('/view')) return link.replace(/\/view.*/, '/preview');
        if (link.includes('/edit')) return link.replace(/\/edit.*/, '/preview');
        return link;
      };

      const handleStudentSubmit = async () => {
        if (!selectedQuestion) return showToast("Sila pilih soalan dahulu", "error");
        
        let bahagianWajib = false;
        if (selectedQuestion.kertas === 'Kertas 1' || selectedQuestion.kertas === 'Kertas 2' || selectedQuestion.kertas === 'Kertas 3') {
          bahagianWajib = true;
        }

        if (!studentForm.nama || !studentForm.maktab || !studentForm.kelas || !studentForm.jawapan || (bahagianWajib && !studentForm.bahagian)) {
          return showToast("Sila lengkapkan semua butiran, pilihan soalan dan jawapan anda.", "error");
        }
        try {
          const sRef = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
          const infoBahagian = studentForm.bahagian ? ` [${studentForm.bahagian}]` : '';
          
          await addDoc(sRef, {
            questionId: selectedQuestion.id,
            soalanInfo: `${selectedQuestion.negeri} - ${selectedQuestion.kertas} (${selectedQuestion.tahun})${infoBahagian}`,
            nama: studentForm.nama,
            maktab: studentForm.maktab,
            kelas: studentForm.kelas,
            bahagian: studentForm.bahagian,
            jawapan: studentForm.jawapan,
            status: 'Dihantar',
            bintang: null,
            komen: null,
            timestamp: serverTimestamp()
          });
          setStudentForm({ ...studentForm, bahagian: '', jawapan: '' });
          showToast("Jawapan berjaya dihantar! Sila rujuk ruangan arkib.");
        } catch (error) {
          showToast("Gagal menghantar jawapan.", "error");
        }
      };

      const handleTeacherLogin = (e) => {
        e.preventDefault();
        if (e.target.password.value === 'GuruBMcuba') {
          setIsTeacher(true);
          setShowTeacherLogin(false);
          showToast("Berjaya Log Masuk sebagai Guru");
        } else {
          showToast("Kata laluan salah!", "error");
        }
      };

      const handleAddQuestion = async () => {
        if (!newQuestion.pautan) return showToast("Sila masukkan pautan Google Drive", "error");
        try {
          const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
          await addDoc(qRef, { ...newQuestion, timestamp: serverTimestamp() });
          setNewQuestion({ ...newQuestion, pautan: '' });
          showToast("Soalan baharu berjaya ditambah!");
        } catch (error) {
          showToast("Ralat menambah soalan.", "error");
        }
      };

      const saveGrading = async () => {
        if (!gradingSubmission) return;
        if (!gradingForm.bintang) return showToast("Sila berikan penilaian bintang.", "error");
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', gradingSubmission.id);
          await updateDoc(docRef, {
            status: 'Disemak',
            bintang: gradingForm.bintang,
            komen: { kekuatan: gradingForm.kekuatan, kelemahan: gradingForm.kelemahan, intervensi: gradingForm.intervensi },
            disemakPada: serverTimestamp()
          });
          setGradingSubmission(null);
          showToast("Semakan berjaya direkodkan!");
        } catch (error) {
          showToast("Ralat menyimpan semakan.", "error");
        }
      };

      const filteredQuestions = questions.filter(q => 
        (!filterTahun || q.tahun === filterTahun) &&
        (!filterNegeri || q.negeri === filterNegeri) &&
        (!filterKertas || q.kertas === filterKertas)
      );

      const studentArchive = searchMaktab ? submissions.filter(s => s.maktab === searchMaktab) : [];

      if (isMissingConfig) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-center">
             <i className="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
             <h1 className="text-2xl font-bold text-slate-800 mb-2">Konfigurasi Pangkalan Data Diperlukan</h1>
             <p className="text-slate-600 max-w-lg mb-4">Cikgu perlu menggantikan perkataan <b>"TUKAR_INI"</b> dalam fail ini dengan Firebase Config cikgu sendiri untuk membolehkan portal ini berfungsi.</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
          {/* HEADER */}
          <header className="bg-blue-800 text-white shadow-md sticky top-0 z-20">
            <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
              <div 
                className="flex items-center space-x-3 cursor-pointer select-none"
                onDoubleClick={() => !isTeacher && setShowTeacherLogin(true)}
                title="Dwiklik untuk akses guru"
              >
                <i className="fas fa-book-open text-2xl text-yellow-400"></i>
                <div>
                  <h1 className="text-xl font-bold leading-tight">Portal Cemerlang SPM</h1>
                  <p className="text-xs text-blue-200">Latihan & Unjuran Prestasi</p>
                </div>
              </div>
              {isTeacher && (
                <button onClick={() => setIsTeacher(false)} className="flex items-center space-x-1 text-sm bg-blue-700 hover:bg-blue-600 px-3 py-1.5 rounded transition-colors">
                  <i className="fas fa-sign-out-alt"></i> <span className="hidden sm:inline">Log Keluar Guru</span>
                </button>
              )}
            </div>
          </header>

          {/* TOAST */}
          {notification.show && (
            <div className={`fixed top-16 left-1/2 transform -translate-x-1/2 z-50 px-4 py-2 rounded shadow-lg flex items-center space-x-2 transition-all ${notification.type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white`}>
              <i className={`fas ${notification.type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}`}></i>
              <span>{notification.message}</span>
            </div>
          )}

          {/* LOGIN GURU */}
          {showTeacherLogin && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 backdrop-blur-sm p-4">
              <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-xl font-bold flex items-center text-blue-800"><i className="fas fa-shield-alt mr-2"></i> Akses Guru</h2>
                  <button onClick={() => setShowTeacherLogin(false)} className="text-slate-400 hover:text-red-500"><i className="fas fa-times text-xl"></i></button>
                </div>
                <form onSubmit={handleTeacherLogin}>
                  <div className="mb-4">
                    <label className="block text-sm font-semibold mb-1 text-slate-600">Kata Laluan Backdoor</label>
                    <input type="password" name="password" className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Masukkan kata laluan" autoFocus />
                  </div>
                  <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded">Log Masuk</button>
                </form>
              </div>
            </div>
          )}

          {/* SEMAKAN GURU MODAL */}
          {gradingSubmission && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm overflow-y-auto">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl my-8 flex flex-col max-h-[90vh]">
                <div className="p-4 border-b bg-blue-50 flex justify-between items-center rounded-t-xl shrink-0">
                  <h2 className="text-lg font-bold text-blue-800">Semakan Jawapan: {gradingSubmission.nama}</h2>
                  <button onClick={() => setGradingSubmission(null)} className="text-slate-400 hover:text-red-500"><i className="fas fa-times text-xl"></i></button>
                </div>
                <div className="p-4 overflow-y-auto flex-grow">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <div className="mb-4 bg-slate-50 p-4 rounded border">
                        <p className="text-xs text-slate-500 mb-1">Soalan: {gradingSubmission.soalanInfo}</p>
                        <p className="text-sm font-semibold mb-2">Jawapan Pelajar:</p>
                        <p className="text-sm whitespace-pre-wrap text-slate-700">{gradingSubmission.jawapan}</p>
                      </div>
                      <div className="bg-yellow-50 p-3 rounded text-xs text-yellow-800 border border-yellow-200">
                        <p className="font-bold mb-1"><i className="fas fa-star mr-1"></i> Panduan Bintang (1-6):</p>
                        <p>Berikan penilaian keseluruhan kualiti jawapan dari 1 Bintang (Sangat Lemah) hingga 6 Bintang (Cemerlang).</p>
                      </div>
                    </div>
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm font-semibold mb-1">Penilaian (Bintang 1-6)</label>
                        <select 
                          className="w-full border p-2 rounded text-lg bg-yellow-50 focus:ring-2 focus:ring-yellow-500 outline-none" 
                          value={gradingForm.bintang} 
                          onChange={(e) => setGradingForm({...gradingForm, bintang: e.target.value})}
                        >
                          <option value="">-- Pilih Bintang --</option>
                          {[1, 2, 3, 4, 5, 6].map(b => <option key={b} value={b}>{b} Bintang</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-1 text-green-700">Kekuatan</label>
                        <textarea className="w-full border p-2 rounded text-sm min-h-[60px]" value={gradingForm.kekuatan} onChange={(e) => setGradingForm({...gradingForm, kekuatan: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-1 text-red-700">Kelemahan</label>
                        <textarea className="w-full border p-2 rounded text-sm min-h-[60px]" value={gradingForm.kelemahan} onChange={(e) => setGradingForm({...gradingForm, kelemahan: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-1 text-blue-700">Cadangan Intervensi</label>
                        <textarea className="w-full border p-2 rounded text-sm min-h-[60px]" value={gradingForm.intervensi} onChange={(e) => setGradingForm({...gradingForm, intervensi: e.target.value})} />
                      </div>
                    </div>
                  </div>
                </div>
                <div className="p-4 border-t bg-slate-50 flex justify-end shrink-0">
                  <button onClick={saveGrading} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-semibold flex items-center">
                    <i className="fas fa-check-circle mr-2"></i> Simpan Semakan
                  </button>
                </div>
              </div>
            </div>
          )}

          <main className="max-w-7xl mx-auto px-4 py-6">
            {/* TEACHER DASHBOARD */}
            {isTeacher ? (
              <div className="space-y-6">
                <div className="flex space-x-2 border-b border-slate-200">
                  <button className={`py-2 px-4 font-semibold ${teacherTab === 'semakan' ? 'border-b-2 border-blue-600 text-blue-700' : 'text-slate-500'}`} onClick={() => setTeacherTab('semakan')}>Arkib & Semakan</button>
                  <button className={`py-2 px-4 font-semibold ${teacherTab === 'soalan' ? 'border-b-2 border-blue-600 text-blue-700' : 'text-slate-500'}`} onClick={() => setTeacherTab('soalan')}>Pengurusan Soalan</button>
                </div>

                {teacherTab === 'soalan' && (
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h3 className="text-lg font-bold mb-4 flex items-center"><i className="fas fa-plus mr-2 text-blue-600"></i> Tambah Bahan Soalan</h3>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                      <div>
                        <label className="block text-xs font-semibold mb-1 text-slate-500">Tahun</label>
                        <select className="w-full border rounded p-2 text-sm" value={newQuestion.tahun} onChange={(e) => setNewQuestion({...newQuestion, tahun: e.target.value})}>
                          {SENARAI_TAHUN.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-semibold mb-1 text-slate-500">Negeri/Sekolah</label>
                        <select className="w-full border rounded p-2 text-sm" value={newQuestion.negeri} onChange={(e) => setNewQuestion({...newQuestion, negeri: e.target.value})}>
                          {SENARAI_NEGERI.map(n => <option key={n} value={n}>{n}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-semibold mb-1 text-slate-500">Kertas</label>
                        <select className="w-full border rounded p-2 text-sm" value={newQuestion.kertas} onChange={(e) => setNewQuestion({...newQuestion, kertas: e.target.value})}>
                          {SENARAI_KERTAS.map(k => <option key={k} value={k}>{k}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-semibold mb-1 text-slate-500">Pautan Google Drive (PDF)</label>
                        <input type="text" className="w-full border rounded p-2 text-sm" placeholder="https://drive.google.com/..." value={newQuestion.pautan} onChange={(e) => setNewQuestion({...newQuestion, pautan: e.target.value})} />
                      </div>
                    </div>
                    <button onClick={handleAddQuestion} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-semibold">Simpan Soalan</button>
                    
                    <div className="mt-8 overflow-x-auto">
                      <table className="min-w-full text-sm text-left text-slate-600">
                        <thead className="bg-slate-100 uppercase text-xs">
                          <tr><th className="px-4 py-2">Tahun</th><th className="px-4 py-2">Sumber</th><th className="px-4 py-2">Kertas</th><th className="px-4 py-2">Pautan</th></tr>
                        </thead>
                        <tbody>
                          {questions.map(q => (
                            <tr key={q.id} className="border-b">
                              <td className="px-4 py-2">{q.tahun}</td><td className="px-4 py-2">{q.negeri}</td><td className="px-4 py-2">{q.kertas}</td>
                              <td className="px-4 py-2"><a href={q.pautan} target="_blank" className="text-blue-600 hover:underline"><i className="fas fa-file-pdf mr-1"></i> Buka PDF</a></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {teacherTab === 'semakan' && (
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
                    <h3 className="text-lg font-bold mb-4 flex items-center"><i className="fas fa-check-circle mr-2 text-green-600"></i> Arkib & Semakan Jawapan Pelajar</h3>
                    <table className="min-w-full text-sm text-left text-slate-700">
                      <thead className="bg-slate-100 uppercase text-xs text-slate-500">
                        <tr><th className="px-4 py-3">Tarikh</th><th className="px-4 py-3">Pelajar</th><th className="px-4 py-3">Kelas/Maktab</th><th className="px-4 py-3">Latihan</th><th className="px-4 py-3">Status</th><th className="px-4 py-3 text-center">Tindakan</th></tr>
                      </thead>
                      <tbody>
                        {submissions.map(s => (
                          <tr key={s.id} className="border-b hover:bg-slate-50">
                            <td className="px-4 py-3">{s.timestamp?.toDate().toLocaleString('ms-MY') || 'Baru'}</td>
                            <td className="px-4 py-3 font-semibold">{s.nama}</td>
                            <td className="px-4 py-3">{s.kelas} <br/><span className="text-xs text-slate-400">{s.maktab}</span></td>
                            <td className="px-4 py-3">{s.soalanInfo}</td>
                            <td className="px-4 py-3">
                              {s.status === 'Disemak' ? <span className="bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-bold">Disemak ({s.bintang}⭐)</span> : <span className="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-xs font-bold">Menunggu</span>}
                            </td>
                            <td className="px-4 py-3 text-center">
                              <button onClick={() => { setGradingSubmission(s); setGradingForm({ bintang: s.bintang || '', kekuatan: s.komen?.kekuatan || '', kelemahan: s.komen?.kelemahan || '', intervensi: s.komen?.intervensi || '' }); }} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded text-xs font-semibold">Semak</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            ) : (
              /* STUDENT DASHBOARD */
              <div className="space-y-6">
                <section className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                  <h2 className="text-lg font-bold mb-4 text-slate-800 flex items-center"><i className="fas fa-search mr-2 text-blue-600"></i> Cari Koleksi Soalan Percubaan</h2>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                    <div>
                      <label className="block text-xs font-semibold mb-1 text-slate-500">Tahun</label>
                      <select className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50" value={filterTahun} onChange={(e) => setFilterTahun(e.target.value)}>
                        <option value="">Semua Tahun</option>{SENARAI_TAHUN.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold mb-1 text-slate-500">Negeri / Sekolah Khas</label>
                      <select className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50" value={filterNegeri} onChange={(e) => setFilterNegeri(e.target.value)}>
                        <option value="">Semua Lokasi</option>{SENARAI_NEGERI.map(n => <option key={n} value={n}>{n}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold mb-1 text-slate-500">Jenis Kertas</label>
                      <select className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50" value={filterKertas} onChange={(e) => setFilterKertas(e.target.value)}>
                        <option value="">Semua Kertas</option>{SENARAI_KERTAS.map(k => <option key={k} value={k}>{k}</option>)}
                      </select>
                    </div>
                  </div>
                  
                  <div className="flex flex-wrap gap-2">
                    {filteredQuestions.length > 0 ? (
                      filteredQuestions.map(q => (
                        <button key={q.id} onClick={() => { setSelectedQuestion(q); setStudentForm(prev => ({...prev, bahagian: '', jawapan: ''})); }} className={`px-3 py-2 rounded-lg text-sm font-medium border transition-all ${selectedQuestion?.id === q.id ? 'bg-blue-600 text-white border-blue-600 shadow-md transform scale-105' : 'bg-white text-slate-700 hover:bg-slate-100 border-slate-300'}`}>
                          {q.negeri} - {q.kertas} ({q.tahun})
                        </button>
                      ))
                    ) : (<p className="text-sm text-red-500 italic">Tiada soalan dijumpai. Sila hubungi guru anda.</p>)}
                  </div>
                </section>

                {selectedQuestion && (
                  <section className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col md:flex-row h-auto md:h-[700px]">
                    <div className="w-full md:w-1/2 bg-slate-200 flex flex-col border-r border-slate-200">
                      <div className="bg-slate-100 p-3 text-sm font-semibold text-slate-700 border-b flex justify-between items-center">
                        <span><i className="fas fa-file-pdf mr-2 text-blue-600"></i> Paparan Soalan</span>
                        <span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs">{selectedQuestion.negeri} {selectedQuestion.tahun}</span>
                      </div>
                      <div className="flex-grow relative h-[400px] md:h-auto">
                        {selectedQuestion.pautan ? (
                          <iframe src={convertDriveLinkToPreview(selectedQuestion.pautan)} className="absolute inset-0 w-full h-full" title="PDF Soalan"></iframe>
                        ) : (<div className="flex h-full items-center justify-center text-slate-400">Tiada pautan PDF</div>)}
                      </div>
                    </div>
                    <div className="w-full md:w-1/2 flex flex-col bg-white">
                      <div className="bg-blue-50 p-3 text-sm font-semibold text-blue-800 border-b flex items-center">
                        <i className="fas fa-paper-plane mr-2"></i> Ruang Jawapan Pelajar
                      </div>
                      <div className="p-4 flex-grow overflow-y-auto space-y-4">
                        <div className="grid grid-cols-2 gap-3">
                          <div><label className="block text-xs font-semibold mb-1">Nama Penuh</label><input type="text" className="w-full border rounded p-2 text-sm bg-slate-50" value={studentForm.nama} onChange={e=>setStudentForm({...studentForm, nama: e.target.value})} /></div>
                          <div><label className="block text-xs font-semibold mb-1">No. Maktab</label><input type="text" className="w-full border rounded p-2 text-sm bg-slate-50" value={studentForm.maktab} onChange={e=>setStudentForm({...studentForm, maktab: e.target.value})} /></div>
                          <div className="col-span-2"><label className="block text-xs font-semibold mb-1">Kelas</label><input type="text" className="w-full border rounded p-2 text-sm bg-slate-50" value={studentForm.kelas} onChange={e=>setStudentForm({...studentForm, kelas: e.target.value})} /></div>
                          
                          {selectedQuestion.kertas === 'Kertas 1' && (
                            <div className="col-span-2">
                              <label className="block text-xs font-semibold mb-1 text-blue-700">Pilihan Karangan (Wajib)</label>
                              <select className="w-full border rounded p-2 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" value={studentForm.bahagian} onChange={e=>setStudentForm({...studentForm, bahagian: e.target.value})}>
                                <option value="">-- Sila Pilih --</option>
                                <option value="Karangan A">Karangan A</option>
                                <option value="Karangan B">Karangan B</option>
                              </select>
                            </div>
                          )}
                          {selectedQuestion.kertas === 'Kertas 2' && (
                            <div className="col-span-2">
                              <label className="block text-xs font-semibold mb-1 text-blue-700">Pilihan Soalan (Wajib)</label>
                              <select className="w-full border rounded p-2 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" value={studentForm.bahagian} onChange={e=>setStudentForm({...studentForm, bahagian: e.target.value})}>
                                <option value="">-- Sila Pilih (Soalan 1 hingga 9) --</option>
                                {[1,2,3,4,5,6,7,8,9].map(num => <option key={num} value={`Soalan ${num}`}>Soalan {num}</option>)}
                              </select>
                            </div>
                          )}
                          {selectedQuestion.kertas === 'Kertas 3' && (
                            <div className="col-span-2">
                              <label className="block text-xs font-semibold mb-1 text-blue-700">Jenis Ujian (Wajib)</label>
                              <select className="w-full border rounded p-2 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500" value={studentForm.bahagian} onChange={e=>setStudentForm({...studentForm, bahagian: e.target.value})}>
                                <option value="">-- Sila Pilih --</option>
                                <option value="Individu">Individu</option>
                                <option value="Berkumpulan">Berkumpulan</option>
                              </select>
                            </div>
                          )}
                        </div>
                        <div className="flex flex-col h-64 md:h-[350px]">
                          <label className="block text-xs font-semibold mb-1">Taip Jawapan Anda di Sini</label>
                          <textarea className="w-full flex-grow border rounded-lg p-3 text-sm resize-none focus:ring-2 focus:ring-blue-500 outline-none" value={studentForm.jawapan} onChange={e=>setStudentForm({...studentForm, jawapan: e.target.value})}></textarea>
                        </div>
                        <button onClick={handleStudentSubmit} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md flex justify-center items-center">
                          <i className="fas fa-paper-plane mr-2"></i> Hantar Jawapan
                        </button>
                      </div>
                    </div>
                  </section>
                )}

                <section className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <h2 className="text-lg font-bold mb-4 text-slate-800 flex items-center"><i className="fas fa-chart-line mr-2 text-green-600"></i> Arkib Jawapan & Unjuran Prestasi</h2>
                  <div className="bg-slate-50 p-4 rounded-lg border mb-6 flex items-center gap-4">
                    <div className="flex-grow w-full">
                      <label className="block text-sm font-semibold mb-1">Masukkan No. Maktab untuk carian rekod:</label>
                      <div className="flex">
                        <input type="text" className="w-full border rounded-l-lg p-2 outline-none focus:border-blue-500" placeholder="Cth: MS22101..." value={searchMaktab} onChange={(e) => setSearchMaktab(e.target.value)} />
                        <button className="bg-slate-800 text-white px-4 py-2 rounded-r-lg font-semibold hover:bg-slate-700">Semak</button>
                      </div>
                    </div>
                  </div>

                  {searchMaktab && (
                    <div className="space-y-6">
                      {studentArchive.length > 0 ? (
                        <div className="bg-white border rounded-lg p-4">
                          <h3 className="font-bold text-sm mb-4 text-slate-700 flex items-center"><i className="fas fa-chart-bar mr-2"></i> Graf Prestasi Terkini</h3>
                          <div className="flex items-end h-40 gap-2 border-b border-l pb-1 pl-1">
                            {studentArchive.slice(0,10).reverse().map((s, idx) => {
                              const mark = s.bintang ? parseInt(s.bintang) : 0;
                              const heightPct = s.bintang ? Math.max(10, (mark/6)*100) : 5;
                              return (
                                <div key={idx} className="flex flex-col items-center flex-1 group relative">
                                  {s.status === 'Disemak' && <span className="absolute -top-6 text-xs font-bold text-slate-600 opacity-0 group-hover:opacity-100 bg-slate-100 p-1 rounded shadow-sm z-10 whitespace-nowrap">{mark} ⭐</span>}
                                  <div className={`w-full max-w-[40px] rounded-t-sm transition-all ${s.status === 'Disemak' ? 'bg-yellow-400 hover:bg-yellow-500' : 'bg-slate-200'}`} style={{ height: `${heightPct}%` }}></div>
                                  <span className="text-[10px] mt-1 text-slate-500 truncate w-full text-center" title={s.soalanInfo}>{s.soalanInfo.split(' ')[0]}</span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ) : (<p className="text-sm text-slate-500 text-center py-4">Tiada rekod dijumpai untuk No. Maktab ini.</p>)}

                      <div className="space-y-4">
                        {studentArchive.map((s) => {
                          const stars = [];
                          const starCount = s.bintang ? parseInt(s.bintang) : 0;
                          for(let i=0; i<starCount; i++) stars.push(<i key={i} className="fas fa-star text-yellow-500 mr-1"></i>);
                          for(let i=starCount; i<6; i++) stars.push(<i key={`e${i}`} className="far fa-star text-slate-300 mr-1"></i>);

                          return (
                            <div key={s.id} className="border border-slate-200 rounded-lg p-4 bg-white shadow-sm">
                              <div className="flex justify-between items-start mb-3 border-b pb-2">
                                <div><h4 className="font-bold text-slate-800">{s.soalanInfo}</h4><p className="text-xs text-slate-500">Dihantar pada: {s.timestamp?.toDate().toLocaleString('ms-MY')}</p></div>
                                <div className="text-right">
                                  {s.status === 'Disemak' ? (
                                    <div className="inline-block bg-yellow-50 text-yellow-800 px-3 py-1.5 rounded-lg border border-yellow-200 text-center shadow-sm">
                                      <div className="text-lg">{stars}</div>
                                      <p className="text-[10px] font-bold mt-1 uppercase text-yellow-700">Penilaian Guru</p>
                                    </div>
                                  ) : (<span className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs font-bold">Menunggu Semakan</span>)}
                                </div>
                              </div>
                              {s.status === 'Disemak' && s.komen && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
                                  <div className="bg-green-50 border border-green-100 p-2 rounded"><p className="text-xs font-bold text-green-800 mb-1">Kekuatan:</p><p className="text-xs text-green-900">{s.komen.kekuatan || '-'}</p></div>
                                  <div className="bg-red-50 border border-red-100 p-2 rounded"><p className="text-xs font-bold text-red-800 mb-1">Kelemahan:</p><p className="text-xs text-red-900">{s.komen.kelemahan || '-'}</p></div>
                                  <div className="bg-blue-50 border border-blue-100 p-2 rounded"><p className="text-xs font-bold text-blue-800 mb-1">Intervensi:</p><p className="text-xs text-blue-900">{s.komen.intervensi || '-'}</p></div>
                                </div>
                              )}
                              <details className="mt-3 text-sm"><summary className="text-blue-600 cursor-pointer text-xs font-semibold outline-none">Lihat Jawapan Anda</summary><div className="mt-2 p-3 bg-slate-50 border rounded text-slate-700 whitespace-pre-wrap text-sm">{s.jawapan}</div></details>
                            </div>
                          )
                        })}
                      </div>
                    </div>
                  )}
                </section>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
